<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b9d">
    <link rel="apple-touch-icon" href="../icon-180.png">
    <link rel="manifest" href="manifest.json">
    <title>幼稚園バス位置情報 - 保護者用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 左上のフローティングロゴ（旧ヘッダーの代わり） */
        .logo-chip {
            position: absolute;
            top: calc(14px + env(safe-area-inset-top));
            left: 14px;
            z-index: 1200;
            display: flex;
            align-items: center;
            padding: 0;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.22);
        }

        .logo {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: none;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-chip .status {
            font-size: 11px;
            font-weight: 600;
            color: #7a7a7a;
            white-space: nowrap;
        }

        /* 右上のフローティング設定ボタン（ピンク＋白アイコンで地図に埋もれないように） */
        .settings-button {
            position: absolute;
            top: calc(14px + env(safe-area-inset-top));
            right: 14px;
            z-index: 1200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #ffffff;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .settings-button:active {
            transform: scale(0.93);
        }

        /* SVGアイコン共通 */
        .icon-svg {
            width: 20px;
            height: 20px;
            display: block;
            margin: 0 auto;
        }

        .btn-svg {
            width: 16px;
            height: 16px;
            flex: none;
        }

        .settings-button,
        .locate-button {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2400;
        }

        .drawer-backdrop.open {
            display: block;
        }

        /* 連絡バナー: 緑=出発到着 / 赤=遅延 / 黄=通信障害（自動） */
        .notice-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #ffffff;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }

        .notice-banner.info {
            background: linear-gradient(135deg, rgba(72, 209, 111, 0.94) 0%, rgba(40, 167, 69, 0.94) 100%);
        }

        .notice-banner.delay {
            background: linear-gradient(135deg, rgba(255, 90, 82, 0.94) 0%, rgba(224, 53, 43, 0.94) 100%);
        }

        .notice-banner.stale {
            background: linear-gradient(135deg, rgba(255, 159, 10, 0.94) 0%, rgba(255, 120, 0, 0.94) 100%);
        }

        .notice-banner + .notice-banner {
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .notice-ok {
            flex: none;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .notice-ok:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.35);
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .side-stack {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
        }

        /* 画面下部の号車ステータスバー（常時表示・一目で状態がわかる）
           4台までは1段、5台以上は自動で折り返して大きくなる */
        .bus-strip {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: calc(20px + env(safe-area-inset-bottom));
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: 24px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.48) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            width: max-content;
            max-width: 94vw;
        }

        .bus-strip.hidden {
            display: none;
        }

        .bus-strip-chip {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 15px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.68) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1);
            color: #1d1d1f;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .bus-strip-chip:active {
            transform: scale(0.95);
        }

        /* チップの状態色: 緑=通常運行 / 黄=通信障害 / 赤=遅延中 / 灰=停止中 */
        .bus-strip-chip.status-active {
            border-color: rgba(52, 199, 89, 0.7);
            box-shadow: 0 0 12px rgba(52, 199, 89, 0.5), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .bus-strip-chip.status-stale {
            border-color: rgba(255, 149, 0, 0.75);
            box-shadow: 0 0 12px rgba(255, 149, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .bus-strip-chip.status-delay {
            border-color: rgba(255, 59, 48, 0.7);
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.5), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        /* 追跡中ピル（上段中央・ロゴ/設定ボタンと同じ列・タップで解除） */
        .follow-pill {
            position: absolute;
            top: calc(14px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1150;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.82) 0%, rgba(255, 255, 255, 0.55) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            color: #1d1d1f;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .follow-pill:active {
            transform: translateX(-50%) scale(0.95);
        }

        .follow-pill.hidden {
            display: none;
        }

        .follow-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex: none;
            background: #ff4d88;
            animation: pulse-pink 1.6s ease-in-out infinite;
        }

        .follow-x {
            color: #7a7a7a;
            margin-left: 2px;
        }

        @keyframes pulse-pink {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 136, 0.55); }
            50% { box-shadow: 0 0 0 6px rgba(255, 77, 136, 0); }
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex: none;
        }

        .bus-strip-chip.status-active .status-dot {
            background: #34c759;
            animation: pulse 1.6s ease-in-out infinite;
        }

        .bus-strip-chip.status-stale .status-dot {
            background: #ff9500;
        }

        .bus-strip-chip.status-delay .status-dot {
            background: #ff3b30;
            animation: pulse-red 1.6s ease-in-out infinite;
        }

        .bus-strip-chip.status-stopped .status-dot {
            background: #a0a0a6;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.55); }
            50% { box-shadow: 0 0 0 6px rgba(52, 199, 89, 0); }
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.55); }
            50% { box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
        }

        /* 号車詳細カード（チップ/マーカーのタップで下からせり出す） */
        .bus-card {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            bottom: calc(84px + env(safe-area-inset-bottom));
            max-height: 42vh;
            overflow-y: auto;
            width: min(360px, 92vw);
            z-index: 1500;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            box-shadow: 0 16px 48px rgba(255, 107, 157, 0.28), inset 0 1px 0 rgba(255, 255, 255, 1);
            padding: 14px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
        }

        .bus-card.open {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .bus-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .bus-card-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bus-card-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 9999px;
            color: #ffffff;
        }

        .bus-card-status.status-active { background: linear-gradient(145deg, #48d16f 0%, #28a745 100%); }
        .bus-card-status.status-stale { background: linear-gradient(145deg, #ffb340 0%, #ff8c00 100%); }
        .bus-card-status.status-delay { background: linear-gradient(145deg, #ff5a52 0%, #e0352b 100%); }
        .bus-card-status.status-stopped { background: linear-gradient(145deg, #9a9aa0 0%, #7c7c82 100%); }

        .bus-card-close {
            flex: none;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1);
            color: #7a7a7a;
            font-size: 13px;
            cursor: pointer;
        }

        .bus-card-row {
            color: #7a7a7a;
            font-size: 12px;
            padding: 3px 0;
        }

        .bus-card-notice {
            background: linear-gradient(135deg, rgba(255, 159, 10, 0.16) 0%, rgba(255, 120, 0, 0.12) 100%);
            border: 1px solid rgba(255, 149, 0, 0.35);
            border-radius: 12px;
            padding: 8px 10px;
            margin: 6px 0;
            color: #1d1d1f;
            font-weight: 600;
        }

        .bus-card-push {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 9999px;
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bus-card-push:active {
            transform: scale(0.97);
        }

        .bus-card-push.subscribed {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.68) 100%);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1);
            color: #1d1d1f;
        }

        /* 現在地ボタン（左下・運行バーの左上あたり） */
        .locate-button {
            position: absolute;
            left: 14px;
            bottom: calc(88px + env(safe-area-inset-bottom));
            z-index: 1200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #ffffff;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .locate-button:active {
            transform: scale(0.93);
        }

        /* 現在地オン中は白背景＋ピンクアイコンに反転してわかりやすく */
        .locate-button.on {
            background: #ffffff;
            color: #ff4d88;
            border-color: rgba(255, 107, 157, 0.7);
            box-shadow: 0 0 14px rgba(255, 107, 157, 0.6), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .push-panel {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.48) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            padding: 8px;
            font-size: 12px;
        }

        .push-panel.hidden {
            display: none;
        }

        .push-toggle {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 18px;
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .push-toggle small {
            display: block;
            font-size: 10px;
            font-weight: 400;
            opacity: 0.85;
            margin-top: 2px;
        }

        .push-toggle .row {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .push-toggle:active {
            transform: scale(0.97);
        }

        .push-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .push-options.hidden {
            display: none;
        }

        .push-options-title {
            color: #7a7a7a;
            font-size: 11px;
            padding: 2px 4px;
        }

        .push-option {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.68) 100%);
            box-shadow: 0 3px 10px rgba(255, 107, 157, 0.12), inset 0 1px 0 rgba(255, 255, 255, 1);
            color: #1d1d1f;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        .push-option:active {
            background: rgba(255, 240, 245, 0.9);
            transform: scale(0.97);
        }

        .push-note {
            color: #7a7a7a;
            font-size: 11px;
            padding: 4px;
            line-height: 1.5;
        }


        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.72) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 16px 48px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 1);
            z-index: 2000;
            text-align: center;
        }

        .loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #ff6b9d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, rgba(255, 90, 82, 0.95) 0%, rgba(224, 53, 43, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 30px rgba(224, 53, 43, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            z-index: 2000;
            display: none;
            max-width: 90%;
            font-size: 14px;
            font-weight: 400;
        }

        .notification.show {
            display: block;
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* PCでは従来どおり右上に浮かせ、スマホでは設定ボタンから開くドロワーにする */
        @media (min-width: 768px) {
            .settings-button {
                display: none;
            }
        }

        @media (max-width: 767px) {
            .bus-strip-chip {
                padding: 10px 12px;
                font-size: 14px;
                gap: 6px;
            }

            .bus-strip {
                gap: 7px;
                max-width: 96vw;
            }

            .side-stack {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: min(300px, 82vw);
                padding: 16px 14px;
                background: linear-gradient(160deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.7) 100%);
                backdrop-filter: blur(30px) saturate(200%);
                -webkit-backdrop-filter: blur(30px) saturate(200%);
                border-left: 1px solid rgba(255, 255, 255, 0.7);
                box-shadow: -12px 0 40px rgba(255, 107, 157, 0.25);
                transform: translateX(105%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 2500;
                overflow-y: auto;
            }

            .side-stack.open {
                transform: translateX(0);
            }

            .log-panel {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div id="noticeBanners"></div>

    <div class="map-container">
        <div id="map"></div>
        <div class="logo-chip">
            <div class="logo">
                <img src="../logo.png" alt="ロゴ" onerror="this.parentElement.innerHTML='🚐'">
            </div>
            <!-- 接続状態はJSが参照するため要素は残すが表示しない -->
            <span class="status" id="statusText" style="display: none;">認証中...</span>
        </div>
        <button class="settings-button" id="menuButton" aria-label="設定">

    <!-- 先にグローバル変数とinitMap関数を定義（Google Mapsのコールバックから呼ばれる） -->
    <script>
        let map;

        function initMap() {
            // 幼稚園（さいたま市岩槻区宮町1-6-20）付近
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 14,
                center: { lat: 35.9580, lng: 139.6992 },
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
                zoomControl: false,
                cameraControl: false,
            });

            if (window.__onMapReady) {
                window.__onMapReady();
            }
        }

        function showNotification(message, type = 'error') {
            const notificationDiv = document.getElementById('notification');
            notificationDiv.textContent = message;
            notificationDiv.className = 'notification show';
            setTimeout(() => {
                notificationDiv.classList.remove('show');
            }, 3000);
        }

        // ========================================
        // ドロワー（スマホ時のメニュー）の開閉
        // ========================================
        function setDrawer(open) {
            document.getElementById('sideStack').classList.toggle('open', open);
            document.getElementById('drawerBackdrop').classList.toggle('open', open);
        }

        document.getElementById('menuButton').addEventListener('click', () => {
            setDrawer(!document.getElementById('sideStack').classList.contains('open'));
        });

        document.getElementById('drawerBackdrop').addEventListener('click', () => setDrawer(false));

        // ========================================
        // PWAインストール導線（設定メニュー内）
        // ========================================
        let deferredInstallPrompt = null;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (!isStandalone) {
                document.getElementById('installButton').style.display = 'block';
                document.getElementById('pwaPanel').classList.remove('hidden');
            }
        });

        if (!isStandalone && isIOS) {
            document.getElementById('iosInstallNote').style.display = 'block';
            document.getElementById('pwaPanel').classList.remove('hidden');
        }

        document.getElementById('installButton').addEventListener('click', () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            deferredInstallPrompt = null;
            document.getElementById('installButton').style.display = 'none';
        });
    </script>

    <!-- Firebase SDKとメインロジック -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
        import { getMessaging, getToken, deleteToken, isSupported as isMessagingSupported } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-messaging.js";

        // ========================================
        // Firebase設定（運転手用ページと同一プロジェクト）
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBDbScn1FCiedXrE3BoORjw1KRPP6Rbw9s",
            authDomain: "realtimebus-e46a1.firebaseapp.com",
            databaseURL: "https://realtimebus-e46a1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtimebus-e46a1",
            storageBucket: "realtimebus-e46a1.firebasestorage.app",
            messagingSenderId: "508497237681",
            appId: "1:508497237681:web:a9d898ca4ac098f1133490",
            measurementId: "G-1PV5B24RK1"
        };

        const STALE_MS = 60000; // この時間以上lastUpdateが更新されなければ「通信途絶?」表示にする

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        const busMarkers = {};
        const busPolylines = {};
        const subscribedSessions = {};
        const pathUnsubscribes = {};
        let latestBusData = {};
        let initialCentered = false;

        // 号車名に「テスト」を含むバスは保護者には見せない（?test=1 付きURLでのみ表示。
        // 開発・動作確認のとき保護者に通知や表示が飛ばないようにするための仕組み）
        const showTestBuses = new URLSearchParams(location.search).get('test') === '1';
        function isHiddenTestBus(busId, bus) {
            if (showTestBuses) return false;
            const name = String((bus && bus.busNumber) || busId);
            return name.includes('テスト') || String(busId).includes('テスト');
        }

        window.__onMapReady = () => {
            updateMapMarkers(latestBusData);
            centerOnActiveBusOnce();
            map.addListener('click', () => closeBusCard());
            map.addListener('dragstart', () => {
                if (followBusId) {
                    followBusId = null;
                    if (openBusCardId) renderBusCard(openBusCardId);
                    updateFollowPill();
                }
            });
        };

        // ページを開いたとき、運行中のバスがいれば最初の1回だけそこへ寄せる
        function centerOnActiveBusOnce() {
            if (initialCentered || !map) return;
            const entry = Object.entries(latestBusData)
                .find(([busId, b]) => b && b.isActive && b.location && !isHiddenTestBus(busId, b));
            if (entry) {
                map.setCenter({ lat: entry[1].location.latitude, lng: entry[1].location.longitude });
                initialCentered = true;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        // 連絡の種別: 出発・到着はお知らせ（緑）、それ以外（渋滞・遅れ）は遅延（赤）
        function noticeKind(message) {
            const m = String(message);
            return (m.includes('出発') || m.includes('到着')) ? 'info' : 'delay';
        }

        function hasDelayNotice(bus) {
            return !!(bus && bus.notice && bus.notice.message && noticeKind(bus.notice.message) === 'delay');
        }

        // 状態: 灰=停止中 / 黄=通信障害 / 赤=遅延中 / 緑=運行中
        function getBusStatus(bus) {
            if (!bus || !bus.isActive) {
                return { className: 'status-stopped', label: '停止中' };
            }
            if (Date.now() - (bus.lastUpdate || 0) > STALE_MS) {
                return { className: 'status-stale', label: '通信障害' };
            }
            if (hasDelayNotice(bus)) {
                return { className: 'status-delay', label: '遅延中' };
            }
            return { className: 'status-active', label: '運行中' };
        }

        function markerIconFor(statusClass) {
            const colors = {
                'status-active': '#34c759',
                'status-stale': '#ff9500',
                'status-delay': '#ff3b30',
                'status-stopped': '#86868b'
            };
            return {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 15,
                fillColor: colors[statusClass] || '#86868b',
                fillOpacity: 1,
                strokeColor: 'white',
                strokeWeight: 3,
            };
        }

        function renderBusStrip(data) {
            const stripEl = document.getElementById('busStrip');
            const entries = Object.entries(data).filter(([busId, bus]) => !isHiddenTestBus(busId, bus));

            if (entries.length === 0) {
                stripEl.classList.add('hidden');
                return;
            }

            stripEl.innerHTML = entries.map(([busId, bus]) => {
                const status = getBusStatus(bus);
                const label = escapeHtml(bus.busNumber ?? busId);
                return `<button class="bus-strip-chip ${status.className}" data-bus-id="${escapeHtml(busId)}" title="${status.label}">
                    <span class="status-dot"></span>${label}号車
                </button>`;
            }).join('');
            stripEl.classList.remove('hidden');
        }

        // バスを画面中央にパンする（カードは小さいので中央でも隠れない）
        function panToBusWithOffset(marker) {
            if (!map) return;
            map.panTo(marker.getPosition());
        }

        document.getElementById('busStrip').addEventListener('click', (event) => {
            const chip = event.target.closest('.bus-strip-chip');
            if (!chip) return;
            const busId = chip.dataset.busId;
            const marker = busMarkers[busId];
            if (marker && map) {
                map.setZoom(16);
                panToBusWithOffset(marker);
            }
            openBusCard(busId);
        });

        // ========================================
        // プッシュ通知の購読設定
        // VAPID_KEY: Firebase Console → プロジェクト設定 → Cloud Messaging →
        // Webプッシュ証明書 の公開鍵を貼る。空のままだと通知機能は表示されない
        // ========================================
        const VAPID_KEY = 'BFnFY8TKgdkfU-MKus2bno673cCh84Y1mCRP-EPu_5Ld4z9MRgqSPbj3EpaoXwMWLf2aMrLnhmgRWox8fRLfgk8';
        const PUSH_STORAGE_KEY = 'busPushSubscription';
        let pushSupported = false;

        // 線画SVGアイコン（絵文字の代わり）
        const SVG_ATTRS = 'class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
        const ICON_BELL = `<svg ${SVG_ATTRS}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>`;
        const ICON_BELL_OFF = `<svg ${SVG_ATTRS}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;
        const ICON_TARGET = `<svg ${SVG_ATTRS}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`;

        const pushPanel = document.getElementById('pushPanel');
        const pushToggleButton = document.getElementById('pushToggleButton');
        const pushOptions = document.getElementById('pushOptions');

        function busLabelFor(busId) {
            return busId === 'all' ? 'すべての号車' : busId.replace('bus', '') + '号車';
        }

        function getSavedSubscription() {
            try {
                return JSON.parse(localStorage.getItem(PUSH_STORAGE_KEY));
            } catch (error) {
                return null;
            }
        }

        function refreshPushStatus() {
            const saved = getSavedSubscription();
            pushToggleButton.innerHTML = (saved && saved.token)
                ? `<span class="row">${ICON_BELL_OFF}${busLabelFor(saved.busId)}の通知オン</span><small>タップで解除</small>`
                : `<span class="row">${ICON_BELL}通知を受け取る</span>`;
        }

        // Service Workerはページ読み込み時に登録を始めておく
        // （通知オンのタップ時に登録から始めるとラグが大きいため）
        let swRegistrationPromise = null;
        function ensureServiceWorker() {
            if (!swRegistrationPromise) {
                swRegistrationPromise = navigator.serviceWorker.register('./firebase-messaging-sw.js');
            }
            return swRegistrationPromise;
        }

        async function setupPushUI() {
            if (!VAPID_KEY) return; // 鍵の設定前は機能ごと非表示

            if (!('serviceWorker' in navigator) || !('Notification' in window)
                || !(await isMessagingSupported().catch(() => false))) {
                // iPhoneのブラウザ表示など、通知非対応の環境では案内だけ出す
                pushPanel.innerHTML = '<div class="push-note">📱 iPhoneの方は、共有メニューから「ホーム画面に追加」して開くと通知を設定できます</div>';
                pushPanel.classList.remove('hidden');
                return;
            }

            pushSupported = true;
            ensureServiceWorker().catch((error) => console.warn('SW事前登録に失敗:', error));
            pushPanel.classList.remove('hidden');
            refreshPushStatus();

            pushToggleButton.addEventListener('click', () => {
                const saved = getSavedSubscription();
                if (saved && saved.token) {
                    unsubscribePush(saved);
                } else {
                    pushOptions.classList.toggle('hidden');
                }
            });

            document.querySelectorAll('.push-option').forEach((button) => {
                button.addEventListener('click', () => subscribePush(button.dataset.bus));
            });
        }

        async function subscribePush(busId) {
            pushOptions.classList.add('hidden');
            pushToggleButton.textContent = '通知を設定しています...';
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    showNotification('通知が許可されませんでした。端末の設定を確認してください');
                    refreshPushStatus();
                    return;
                }
                // GitHub Pages等ではオリジン直下にSWを置けないため明示登録して渡す
                // （登録自体はページ読み込み時に開始済み。ここでは完了を待つだけ）
                const registration = await ensureServiceWorker();
                const messaging = getMessaging(app);
                const token = await getToken(messaging, {
                    vapidKey: VAPID_KEY,
                    serviceWorkerRegistration: registration
                });
                await set(ref(database, `pushSubscriptions/${token}`), {
                    busId: busId,
                    updatedAt: Date.now()
                });
                localStorage.setItem(PUSH_STORAGE_KEY, JSON.stringify({ token: token, busId: busId }));
                refreshPushStatus();
                showNotification(`${busLabelFor(busId)}の通知を受け取ります`);
            } catch (error) {
                console.error('通知の設定に失敗:', error);
                showNotification('通知の設定に失敗しました');
                refreshPushStatus();
            }
        }

        async function unsubscribePush(saved) {
            try {
                await set(ref(database, `pushSubscriptions/${saved.token}`), null);
                await deleteToken(getMessaging(app)).catch(() => {});
                localStorage.removeItem(PUSH_STORAGE_KEY);
                refreshPushStatus();
                showNotification('通知を解除しました');
            } catch (error) {
                console.error('通知の解除に失敗:', error);
                showNotification('通知の解除に失敗しました');
            }
        }

        setupPushUI();

        // ========================================
        // 運転手からの連絡バナー（緑=出発到着 / 赤=遅延、OKで既読）
        // ＋通信障害の自動バナー（黄、通信が戻れば自動で消える）
        // ========================================
        const DISMISSED_KEY = 'dismissedNotices';

        function getDismissedNotices() {
            try {
                return JSON.parse(localStorage.getItem(DISMISSED_KEY)) || [];
            } catch (error) {
                return [];
            }
        }

        function renderNotices(data) {
            const container = document.getElementById('noticeBanners');
            const dismissed = getDismissedNotices();
            const banners = [];

            Object.entries(data).forEach(([busId, bus]) => {
                if (!bus || isHiddenTestBus(busId, bus)) return;
                const label = escapeHtml(bus.busNumber ?? busId);

                // 運転手からの連絡（運行終了後もOKを押すまで表示され続ける）
                if (bus.notice && bus.notice.message) {
                    const key = `${busId}:${bus.notice.timestamp}`;
                    if (!dismissed.includes(key)) {
                        const kind = noticeKind(bus.notice.message);
                        const icon = kind === 'info' ? '🚌' : '⚠️';
                        banners.push(`<div class="notice-banner ${kind}">
                            <span>${icon} ${label}号車: ${escapeHtml(bus.notice.message)}（${timeStr(bus.notice.timestamp || Date.now())}）</span>
                            <button class="notice-ok" data-dismiss="${escapeHtml(key)}">OK</button>
                        </div>`);
                    }
                }

                // 通信障害の警告（運行中なのに更新が止まっているバス）
                if (bus.isActive && bus.lastUpdate && Date.now() - bus.lastUpdate > STALE_MS) {
                    banners.push(`<div class="notice-banner stale">
                        <span>⚠️ ${label}号車: 通信が途絶えています（最終更新 ${timeStr(bus.lastUpdate)}）</span>
                    </div>`);
                }
            });

            container.innerHTML = banners.join('');
        }

        document.getElementById('noticeBanners').addEventListener('click', (event) => {
            const button = event.target.closest('.notice-ok');
            if (!button) return;
            const list = getDismissedNotices();
            list.push(button.dataset.dismiss);
            localStorage.setItem(DISMISSED_KEY, JSON.stringify(list.slice(-30)));
            renderNotices(latestBusData);
        });

        // ========================================
        // 号車詳細カード（チップ/マーカーのタップで表示）
        // 状態・最終更新・現在の連絡・今日の履歴・通知設定をまとめて見られる
        // ========================================
        let openBusCardId = null;
        let followBusId = null;

        function timeStr(ts) {
            return new Date(ts).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        }

        function renderBusCard(busId) {
            const bus = latestBusData[busId];
            if (!bus) {
                closeBusCard();
                return;
            }
            const status = getBusStatus(bus);
            const label = escapeHtml(bus.busNumber ?? busId);
            const lastUpdate = bus.lastUpdate ? timeStr(bus.lastUpdate) : 'なし';

            let html = `<div class="bus-card-header">
                <div class="bus-card-title">🚌 ${label}号車 <span class="bus-card-status ${status.className}">${status.label}</span></div>
                <button class="bus-card-close" data-action="close" aria-label="閉じる">✕</button>
            </div>
            <div class="bus-card-row">最終更新: ${lastUpdate}</div>`;

            if (bus.isActive && bus.notice && bus.notice.message) {
                html += `<div class="bus-card-notice">📢 ${escapeHtml(bus.notice.message)}（${timeStr(bus.notice.timestamp || Date.now())}）</div>`;
            }

            const following = followBusId === busId;
            html += `<button class="bus-card-push ${following ? '' : 'subscribed'}" data-action="follow">${ICON_TARGET}${following ? '追跡中（タップで解除）' : 'このバスを追跡'}</button>`;

            if (pushSupported) {
                const saved = getSavedSubscription();
                if (saved && saved.token && saved.busId === busId) {
                    html += `<button class="bus-card-push subscribed" data-action="unsubscribe">${ICON_BELL_OFF}この号車の通知をオフにする</button>`;
                } else {
                    html += `<button class="bus-card-push" data-action="subscribe">${ICON_BELL}この号車の通知を受け取る</button>`;
                }
            }

            document.getElementById('busCard').innerHTML = html;
        }

        // 追跡はカードを閉じても・別のバスのカードを開いても続く。
        // 解除は追跡中ピル・「追跡中」ボタンの再タップ・地図のドラッグのみ
        function updateFollowPill() {
            const pill = document.getElementById('followPill');
            const bus = followBusId ? latestBusData[followBusId] : null;
            if (!bus) {
                pill.classList.add('hidden');
                return;
            }
            const label = escapeHtml(bus.busNumber ?? followBusId);
            pill.innerHTML = `<span class="follow-dot"></span>${label}号車を追跡中<span class="follow-x">✕</span>`;
            pill.classList.remove('hidden');
        }

        document.getElementById('followPill').addEventListener('click', () => {
            followBusId = null;
            updateFollowPill();
            if (openBusCardId) renderBusCard(openBusCardId);
        });

        function openBusCard(busId) {
            openBusCardId = busId;
            renderBusCard(busId);
            document.getElementById('busCard').classList.add('open');
        }

        function closeBusCard() {
            openBusCardId = null;
            document.getElementById('busCard').classList.remove('open');
        }

        document.getElementById('busCard').addEventListener('click', async (event) => {
            const target = event.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;

            if (action === 'close') {
                closeBusCard();
                return;
            }
            if (action === 'follow' && openBusCardId) {
                followBusId = followBusId === openBusCardId ? null : openBusCardId;
                if (followBusId) {
                    const marker = busMarkers[followBusId];
                    if (marker) panToBusWithOffset(marker);
                    closeBusCard(); // 追跡を始めたらカードを閉じて地図を見せる
                } else {
                    renderBusCard(openBusCardId);
                }
                updateFollowPill();
                return;
            }
            if (action === 'subscribe' && openBusCardId) {
                target.textContent = '通知を設定しています...';
                await subscribePush(openBusCardId);
                if (openBusCardId) renderBusCard(openBusCardId);
                return;
            }
            if (action === 'unsubscribe') {
                const saved = getSavedSubscription();
                if (saved) await unsubscribePush(saved);
                if (openBusCardId) renderBusCard(openBusCardId);
            }
        });

        // ========================================
        // 自分の現在地表示（📍ボタンでオン/オフ）
        // ========================================
        let myLocationMarker = null;
        let myLocationWatchId = null;

        document.getElementById('locateButton').addEventListener('click', () => {
            const button = document.getElementById('locateButton');

            if (myLocationWatchId !== null) {
                navigator.geolocation.clearWatch(myLocationWatchId);
                myLocationWatchId = null;
                if (myLocationMarker) {
                    myLocationMarker.setMap(null);
                    myLocationMarker = null;
                }
                button.classList.remove('on');
                return;
            }

            if (!navigator.geolocation || !map) {
                showNotification('現在地を取得できません');
                return;
            }

            let firstFix = true;
            myLocationWatchId = navigator.geolocation.watchPosition((position) => {
                const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                if (!myLocationMarker) {
                    myLocationMarker = new google.maps.Marker({
                        map: map,
                        position: pos,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 8,
                            fillColor: '#1a73e8',
                            fillOpacity: 1,
                            strokeColor: 'white',
                            strokeWeight: 3,
                        },
                        title: '現在地',
                        zIndex: 999,
                    });
                } else {
                    myLocationMarker.setPosition(pos);
                }
                if (firstFix) {
                    map.panTo(pos);
                    firstFix = false;
                }
            }, (error) => {
                console.error('現在地の取得に失敗:', error);
                showNotification('現在地を取得できませんでした。位置情報の許可を確認してください');
                if (myLocationWatchId !== null) {
                    navigator.geolocation.clearWatch(myLocationWatchId);
                    myLocationWatchId = null;
                }
                button.classList.remove('on');
            }, { enableHighAccuracy: true });

            button.classList.add('on');
        });

        function subscribeBusPath(busId, sessionId) {
            if (subscribedSessions[busId] === sessionId) return;
            subscribedSessions[busId] = sessionId;

            // 前のセッションの監視を解除（開きっぱなしの端末でリスナーが溜まるのを防ぐ）
            if (pathUnsubscribes[busId]) {
                pathUnsubscribes[busId]();
            }

            if (busPolylines[busId]) {
                busPolylines[busId].setMap(null);
            }
            const polyline = new google.maps.Polyline({
                map: map,
                strokeColor: '#ff6b9d',
                strokeOpacity: 0.7,
                strokeWeight: 3,
            });
            busPolylines[busId] = polyline;

            const pathRef = ref(database, `buses/${busId}/sessions/${sessionId}/path`);
            pathUnsubscribes[busId] = onValue(pathRef, (snapshot) => {
                const val = snapshot.val() || {};
                const points = Object.values(val)
                    .sort((a, b) => a.timestamp - b.timestamp)
                    .map((p) => ({ lat: p.lat, lng: p.lng }));
                polyline.setPath(points);
            });
        }

        function updateMapMarkers(data) {
            if (typeof google === 'undefined' || !map) return;

            const seenIds = new Set();

            Object.entries(data).forEach(([busId, bus]) => {
                if (isHiddenTestBus(busId, bus)) return;
                seenIds.add(busId);
                if (!bus.location) return;

                const pos = { lat: bus.location.latitude, lng: bus.location.longitude };
                const status = getBusStatus(bus);

                let marker = busMarkers[busId];
                if (!marker) {
                    marker = new google.maps.Marker({ map: map });
                    marker.addListener('click', () => {
                        panToBusWithOffset(marker);
                        openBusCard(busId);
                    });
                    busMarkers[busId] = marker;
                }
                marker.setPosition(pos);
                if (busId === followBusId && map) {
                    panToBusWithOffset(marker);
                }
                marker.setIcon(markerIconFor(status.className));
                marker.setLabel({
                    text: String(bus.busNumber ?? ''),
                    color: 'white',
                    fontSize: '14px',
                    fontWeight: 'bold'
                });

                if (bus.isActive && bus.currentSessionId) {
                    subscribeBusPath(busId, bus.currentSessionId);
                }
            });

            // 消えたバスのマーカー・軌跡・監視を除去
            Object.keys(busMarkers).forEach((busId) => {
                if (!seenIds.has(busId)) {
                    busMarkers[busId].setMap(null);
                    delete busMarkers[busId];
                    if (busPolylines[busId]) {
                        busPolylines[busId].setMap(null);
                        delete busPolylines[busId];
                    }
                    if (pathUnsubscribes[busId]) {
                        pathUnsubscribes[busId]();
                        delete pathUnsubscribes[busId];
                    }
                    delete subscribedSessions[busId];
                }
            });
        }

        function subscribeBuses() {
            const busesRef = ref(database, 'buses');
            onValue(busesRef, (snapshot) => {
                latestBusData = snapshot.val() || {};
                renderBusStrip(latestBusData);
                updateMapMarkers(latestBusData);
                renderNotices(latestBusData);
                updateFollowPill();
                if (openBusCardId) renderBusCard(openBusCardId);
                centerOnActiveBusOnce();
                document.getElementById('loading').classList.add('hidden');
            }, (error) => {
                console.error('バス情報の取得に失敗:', error);
                showNotification('バス情報の取得に失敗しました');
                document.getElementById('loading').classList.add('hidden');
            });
        }

        // ステータス表示の定期更新（通信障害の判定・黄バナーを経過時間に応じて更新する）
        setInterval(() => {
            renderBusStrip(latestBusData);
            updateMapMarkers(latestBusData);
            renderNotices(latestBusData);
        }, 15000);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusText').textContent = 'リアルタイム更新中';
                subscribeBuses();
            } else {
                document.getElementById('statusText').textContent = '認証中...';
            }
        });

        signInAnonymously(auth).catch((error) => {
            console.error('Firebase auth error:', error);
            showNotification('認証に失敗しました。通信環境を確認してください');
            document.getElementById('loading').classList.add('hidden');
        });
    </script>

        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKHPhToo8HfzoQ4QYgCZ5HQtlyu_u7r70&callback=initMap&language=ja">
    </script>
