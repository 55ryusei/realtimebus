<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b9d">
    <title>はくつる幼稚園 バス位置情報</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(160deg, #fff0f5 0%, #ffe3ec 100%);
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(380px, 100%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.72) 100%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 1);
            padding: 28px 24px;
            text-align: center;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: block;
        }

        h1 {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        a.link {
            display: block;
            padding: 15px;
            border-radius: 9999px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.45);
            transition: transform 0.2s;
        }

        a.link:active {
            transform: scale(0.97);
        }

        a.link.sub {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.75) 100%);
            color: #1d1d1f;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .note {
            margin-top: 16px;
            font-size: 11px;
            color: #7a7a7a;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="logo.png" alt="はくつる幼稚園">
        <h1>はくつる幼稚園 バス位置情報</h1>
        <div class="links">
            <a class="link" href="./viewer/">保護者の方はこちら</a>
            <a class="link sub" href="./driver/">運転手用（職員）</a>
            <a class="link sub" href="./admin/">運行履歴（園用）</a>
        </div>
        <div class="note">それぞれのページから「アプリとして入れる」ができます</div>
    </div>
</body>
</html>
