<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b9d">
    <link rel="manifest" href="manifest.json">
    <title>幼稚園バス管理 - 運行モード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 左上のフローティングロゴ（旧ヘッダーの代わり） */
        .logo-chip {
            position: absolute;
            top: calc(14px + env(safe-area-inset-top));
            left: 14px;
            z-index: 1200;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px 5px 5px;
            border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.48) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .logo {
            width: 34px;
            height: 34px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: none;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-chip .status {
            font-size: 11px;
            font-weight: 600;
            color: #7a7a7a;
            white-space: nowrap;
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        /* 運行情報は左下に置き、右上は操作ボタンだけにする */
        .info-dock {
            position: absolute;
            left: 15px;
            bottom: calc(20px + env(safe-area-inset-bottom));
            z-index: 1000;
        }

        .start-button {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.55);
            font-size: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .start-button.stopped {
            background: linear-gradient(145deg, rgba(255, 155, 183, 0.95) 0%, rgba(255, 77, 136, 0.95) 100%);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.45),
                        inset 0 2px 4px rgba(255, 255, 255, 0.55),
                        inset 0 -8px 14px rgba(255, 255, 255, 0.12);
        }

        .start-button.running {
            background: linear-gradient(145deg, rgba(255, 111, 97, 0.95) 0%, rgba(224, 53, 43, 0.95) 100%);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.4),
                        inset 0 2px 4px rgba(255, 255, 255, 0.5),
                        inset 0 -8px 14px rgba(255, 255, 255, 0.1);
        }

        .start-button:active {
            transform: scale(0.93);
        }

        .start-icon {
            width: 26px;
            height: 26px;
            display: block;
        }

        .bus-icon {
            width: 30px;
            height: 30px;
            display: block;
        }

        .btn-svg {
            width: 16px;
            height: 16px;
            flex: none;
        }

        .notice-button {
            padding: 11px 20px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 9999px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.48) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notice-button:active {
            transform: scale(0.95);
        }

        .notice-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .notice-option {
            padding: 13px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.68) 100%);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #1d1d1f;
            box-shadow: 0 4px 14px rgba(255, 107, 157, 0.12), inset 0 1px 0 rgba(255, 255, 255, 1);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        .notice-option:active {
            transform: scale(0.97);
            background: rgba(255, 240, 245, 0.9);
        }

        /* 送信中の連絡ブロック（モーダル内・取り消しを目立たせる） */
        .notice-current {
            border: 1px solid rgba(255, 149, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 159, 10, 0.14) 0%, rgba(255, 120, 0, 0.1) 100%);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 14px;
        }

        .notice-current.hidden {
            display: none;
        }

        .notice-current-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .notice-cancel-button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(224, 53, 43, 0.55);
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.85);
            color: #e0352b;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .notice-cancel-button:active {
            transform: scale(0.97);
        }

        /* 連絡送信中は地図上のボタンをオレンジで光らせる */
        .notice-button.active {
            background: linear-gradient(145deg, rgba(255, 179, 64, 0.95) 0%, rgba(255, 140, 0, 0.95) 100%);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(255, 140, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .info-panel {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.48) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            padding: 8px 12px;
            border-radius: 22px;
            min-width: 150px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            cursor: pointer;
        }

        .info-panel.collapsed {
            padding: 6px 12px;
        }

        .info-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 5px;
        }

        .info-panel-toggle {
            font-size: 14px;
            color: #ff6b9d;
            transition: transform 0.3s;
            user-select: none;
        }

        .info-panel.collapsed .info-panel-toggle {
            transform: rotate(180deg);
        }

        .info-panel-details {
            max-height: 200px;
            overflow: hidden;
            transition: max-height 0.3s, opacity 0.3s;
            opacity: 1;
        }

        .info-panel.collapsed .info-panel-details {
            max-height: 0;
            opacity: 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            gap: 12px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #7a7a7a;
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
        }

        .info-value {
            font-weight: 600;
            font-size: 12px;
            color: #1d1d1f;
            text-align: right;
        }

        /* 号車選択モーダル */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.74) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 24px 60px rgba(255, 107, 157, 0.3), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .modal-title {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: -0.2px;
            text-align: center;
            margin-bottom: 20px;
            color: #1d1d1f;
        }

        .bus-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .bus-button {
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.68) 100%);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            box-shadow: 0 4px 14px rgba(255, 107, 157, 0.12), inset 0 1px 0 rgba(255, 255, 255, 1);
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #1d1d1f;
        }

        .bus-button:hover {
            background: rgba(255, 255, 255, 0.98);
        }

        .bus-button:active {
            transform: scale(0.97);
        }

        .bus-button.selected {
            border-color: rgba(255, 107, 157, 0.9);
            box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.85),
                        0 6px 20px rgba(255, 107, 157, 0.35),
                        inset 0 1px 0 rgba(255, 255, 255, 1);
            background: linear-gradient(160deg, #ffffff 0%, #fff0f5 100%);
            color: #1d1d1f;
        }

        .custom-bus-input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 9999px;
            font-size: 17px;
            margin-bottom: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: inset 0 2px 6px rgba(31, 38, 135, 0.06);
            color: #1d1d1f;
        }

        .custom-bus-input:focus {
            outline: none;
            border-color: rgba(255, 107, 157, 0.8);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.18), inset 0 2px 6px rgba(31, 38, 135, 0.06);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-button {
            flex: 1;
            padding: 12px 22px;
            border: none;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 400;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .modal-button.cancel {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 1);
            color: #1d1d1f;
        }

        .modal-button.cancel:active {
            background: rgba(235, 235, 240, 0.9);
            transform: scale(0.95);
        }

        .modal-button.confirm {
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }

        .modal-button.confirm:active {
            transform: scale(0.95);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.72) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 16px 48px rgba(255, 107, 157, 0.25), inset 0 1px 0 rgba(255, 255, 255, 1);
            z-index: 2000;
            text-align: center;
        }

        .loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #ff6b9d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, rgba(255, 90, 82, 0.95) 0%, rgba(224, 53, 43, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 30px rgba(224, 53, 43, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            z-index: 2000;
            display: none;
            max-width: 90%;
            font-size: 14px;
            font-weight: 400;
        }

        .notification.show {
            display: block;
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .notification.success {
            background: linear-gradient(145deg, rgba(255, 143, 179, 0.95) 0%, rgba(255, 77, 136, 0.95) 100%);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .bus-badge {
            background: linear-gradient(145deg, #ff8fb3 0%, #ff4d88 100%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
            color: white;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <div id="map"></div>

        <div class="logo-chip">
            <div class="logo">
                <img src="logo.png" alt="ロゴ" onerror="this.parentElement.innerHTML='🚐'">
            </div>
            <span class="status" id="statusText">認証中...</span>
            <span id="busBadge"></span>
        </div>

        <div class="controls">
            <button id="startButton" class="start-button stopped">
                <svg class="start-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 4 21 12 7 20 7 4"/></svg>
                <div>運行開始</div>
            </button>

            <button id="noticeButton" class="notice-button" style="display: none;"><svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>連絡</button>
        </div>

        <div class="info-dock">
            <div class="info-panel collapsed" id="infoPanel">
                <div class="info-panel-header">
                    <div class="info-item" style="border: none; padding: 0;">
                        <span class="info-label">運行時間</span>
                        <span class="info-value" id="duration">00:00:00</span>
                    </div>
                    <span class="info-panel-toggle">▼</span>
                </div>
                <div class="info-panel-details">
                    <div class="info-item">
                        <span class="info-label">更新回数</span>
                        <span class="info-value" id="updateCount">0回</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">精度</span>
                        <span class="info-value" id="accuracy">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">連絡</span>
                        <span class="info-value" id="noticeStatus">なし</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 号車選択モーダル -->
    <div class="modal hidden" id="busSelectionModal">
        <div class="modal-content">
            <div class="modal-title">号車を選択</div>
            <div class="bus-selection">
                <button class="bus-button" data-bus="1">
                    <svg class="bus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 2 7"/><path d="M10 6h4"/><path d="m22 7-2-1"/><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 21v-2"/></svg>
                    <span>1号車</span>
                </button>
                <button class="bus-button" data-bus="2">
                    <svg class="bus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 2 7"/><path d="M10 6h4"/><path d="m22 7-2-1"/><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 21v-2"/></svg>
                    <span>2号車</span>
                </button>
                <button class="bus-button" data-bus="3">
                    <svg class="bus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 2 7"/><path d="M10 6h4"/><path d="m22 7-2-1"/><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 21v-2"/></svg>
                    <span>3号車</span>
                </button>
                <button class="bus-button" data-bus="6">
                    <svg class="bus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 2 7"/><path d="M10 6h4"/><path d="m22 7-2-1"/><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 21v-2"/></svg>
                    <span>6号車</span>
                </button>
                <button class="bus-button" data-bus="テスト" id="testBusButton" style="display: none;">
                    <svg class="bus-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></svg>
                    <span>テスト</span>
                </button>
            </div>
            <input type="password" class="custom-bus-input" id="pinInput" placeholder="運行開始の暗証番号" inputmode="numeric" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-button cancel" id="cancelButton">キャンセル</button>
                <button class="modal-button confirm" id="confirmButton">決定</button>
            </div>
        </div>
    </div>

    <!-- 保護者への連絡モーダル -->
    <div class="modal hidden" id="noticeModal">
        <div class="modal-content">
            <div class="modal-title">保護者への連絡</div>
            <div class="notice-current hidden" id="currentNoticeBlock">
                <div class="notice-current-text" id="currentNoticeText"></div>
                <button class="notice-cancel-button" id="cancelNoticeButton">🚫 この連絡を取り消す</button>
            </div>
            <div class="notice-options">
                <button class="notice-option" data-message="園を出発しました">園を出発しました</button>
                <button class="notice-option" data-message="園に到着しました">園に到着しました</button>
                <button class="notice-option" data-message="渋滞のため遅れています">渋滞のため遅れています</button>
                <button class="notice-option" data-message="約5分遅れています">約5分遅れています</button>
                <button class="notice-option" data-message="約10分遅れています">約10分遅れています</button>
                <button class="notice-option" data-message="15分以上遅れています">15分以上遅れています</button>
            </div>
            <div class="modal-buttons">
                <button class="modal-button cancel" id="noticeCancelButton">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>位置情報を取得中...</div>
    </div>

    <div class="notification" id="notification"></div>

    <!-- 先にグローバル変数とinitMap関数を定義 -->
    <script>
        // ========================================
        // グローバル変数
        // ========================================
        let map;
        let marker;
        let polyline;
        let path = [];
        let isTracking = false;
        let watchId = null;
        let startTime = null;
        let durationInterval = null;
        let updateCount = 0;
        let currentBusId = null;
        let currentSessionId = null;
        let selectedBusNumber = null;
        let database = null;
        let lastWrittenPos = null;
        let lastWriteTime = 0;
        let writeFailureNotified = false;
        let wakeLock = null;

        // ========================================
        // 地図の初期化（Google Mapsから呼ばれる）
        // ========================================
        function initMap() {
            // 幼稚園（さいたま市岩槻区宮町1-6-20）付近
            const defaultCenter = { lat: 35.9580, lng: 139.6992 };
            
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: defaultCenter,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
                zoomControl: false,
                cameraControl: false,
            });

            marker = new google.maps.Marker({
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 15,
                    fillColor: '#ff6b9d',
                    fillOpacity: 1,
                    strokeColor: 'white',
                    strokeWeight: 3,
                },
                label: {
                    text: '',
                    color: 'white',
                    fontSize: '14px',
                    fontWeight: 'bold'
                }
            });

            polyline = new google.maps.Polyline({
                map: map,
                strokeColor: '#ff6b9d',
                strokeOpacity: 0.8,
                strokeWeight: 4,
            });

            getCurrentLocation();
        }

        // ========================================
        // 現在地取得
        // ========================================
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                showNotification('このブラウザは位置情報に対応していません', 'error');
                return;
            }

            document.getElementById('loading').classList.remove('hidden');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };
                    map.setCenter(pos);
                    marker.setPosition(pos);
                    document.getElementById('loading').classList.add('hidden');
                },
                (error) => {
                    document.getElementById('loading').classList.add('hidden');
                    showNotification('位置情報の取得に失敗しました', 'error');
                    console.error(error);
                }
            );
        }

        // ========================================
        // 通知表示
        // ========================================
        function showNotification(message, type = 'error') {
            const notificationDiv = document.getElementById('notification');
            notificationDiv.textContent = message;
            notificationDiv.className = 'notification show';
            
            if (type === 'success') {
                notificationDiv.classList.add('success');
            }
            
            setTimeout(() => {
                notificationDiv.classList.remove('show');
                setTimeout(() => {
                    notificationDiv.classList.remove('success');
                }, 300);
            }, 3000);
        }

        // ========================================
        // エラーハンドリング
        // ========================================
        function handleError(error) {
            let message = '位置情報の取得エラー';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = '位置情報の使用が拒否されました';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = '位置情報が利用できません';
                    break;
                case error.TIMEOUT:
                    message = '位置情報の取得がタイムアウトしました';
                    break;
            }
            showNotification(message, 'error');
        }

        // ========================================
        // 経過時間の更新
        // ========================================
        function updateDuration() {
            if (!startTime) return;
            
            const elapsed = Date.now() - startTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);

            const timeString = 
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');

            document.getElementById('duration').textContent = timeString;
        }
    </script>

    <!-- Firebase SDKとメインロジック -->
    <script type="module">
        // ========================================
        // Firebase SDK のインポート
        // ========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
        import { getDatabase, ref, set, update, push, runTransaction, onDisconnect, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

        // ========================================
        // Firebase設定
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBDbScn1FCiedXrE3BoORjw1KRPP6Rbw9s",
            authDomain: "realtimebus-e46a1.firebaseapp.com",
            databaseURL: "https://realtimebus-e46a1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtimebus-e46a1",
            storageBucket: "realtimebus-e46a1.firebasestorage.app",
            messagingSenderId: "508497237681",
            appId: "1:508497237681:web:a9d898ca4ac098f1133490",
            measurementId: "G-1PV5B24RK1"
        };

        // 運行開始の暗証番号。園で決めた番号に変更してください
        const OPERATOR_PIN = '0000';

        // 線画SVGアイコン（絵文字の代わり）
        const ICON_PLAY = '<svg class="start-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="7 4 21 12 7 20 7 4"/></svg>';
        const ICON_STOP_SQ = '<svg class="start-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';
        const ICON_MEGAPHONE = '<svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>';

        // isActive が残留していても、最終更新がこの時間より古ければ
        // 異常終了とみなして同じ号車での運行再開を許可する
        const STALE_TAKEOVER_MS = 2 * 60 * 1000;

        // Firebaseの初期化
        let app;
        let authReady = false;
        try {
            app = initializeApp(firebaseConfig);
            window.database = getDatabase(app);
            console.log('Firebase initialized');

            const auth = getAuth(app);
            onAuthStateChanged(auth, (user) => {
                authReady = !!user;
                document.getElementById('statusText').textContent = authReady ? '待機中' : '認証中...';
            });
            signInAnonymously(auth).catch((error) => {
                console.error('Firebase auth error:', error);
                showNotification('認証に失敗しました。通信環境を確認してください', 'error');
            });
        } catch (error) {
            console.error('Firebase initialization error:', error);
            alert('Firebaseの初期化に失敗しました。設定を確認してください。');
        };

        // ========================================
        // 再接続時の復元
        // 一時的な通信断で onDisconnect が発火して isActive=false に
        // なった場合、再接続時に運行中状態を書き戻す
        // ========================================
        if (window.database) {
            onValue(ref(window.database, '.info/connected'), (snap) => {
                if (snap.val() !== true || !isTracking || !currentBusId) return;

                const busRef = ref(window.database, `buses/${currentBusId}`);
                update(busRef, {
                    isActive: true,
                    lastUpdate: Date.now(),
                    currentSessionId: currentSessionId
                }).catch((error) => console.error('再接続時の状態復元に失敗:', error));
                onDisconnect(busRef).update({ isActive: false, endTime: serverTimestamp() })
                    .catch((error) => console.error('onDisconnectの再登録に失敗:', error));
            });
        }

        // ========================================
        // 号車選択モーダル
        // ========================================
        const busButtons = document.querySelectorAll('.bus-button');

        busButtons.forEach(button => {
            button.addEventListener('click', function() {
                busButtons.forEach(btn => btn.classList.remove('selected'));
                this.classList.add('selected');
                selectedBusNumber = this.dataset.bus;
            });
        });

        // ?test=1 付きで開いたときだけテスト号車ボタンを表示する
        // （号車名「テスト」は保護者に表示されず、プッシュ通知も送られない）
        if (new URLSearchParams(location.search).get('test') === '1') {
            document.getElementById('testBusButton').style.display = 'flex';
        }

        // ========================================
        // 運行開始/停止ボタン
        // ========================================
        document.getElementById('startButton').addEventListener('click', function() {
            if (!isTracking) {
                if (!authReady) {
                    showNotification('認証準備中です。数秒待ってからもう一度お試しください', 'error');
                    return;
                }
                showBusSelectionModal();
            } else {
                if (confirm('運行を終了しますか？')) {
                    stopTracking();
                }
            }
        });

        // ========================================
        // 号車選択モーダル表示
        // ========================================
        function showBusSelectionModal() {
            document.getElementById('busSelectionModal').classList.remove('hidden');
            selectedBusNumber = null;
            busButtons.forEach(btn => btn.classList.remove('selected'));
            document.getElementById('pinInput').value = '';
        }

        // キャンセルボタン
        document.getElementById('cancelButton').addEventListener('click', function() {
            document.getElementById('busSelectionModal').classList.add('hidden');
        });

        // 決定ボタン
        document.getElementById('confirmButton').addEventListener('click', function() {
            if (!selectedBusNumber) {
                showNotification('号車を選択してください', 'error');
                return;
            }
            const pinInput = document.getElementById('pinInput');
            if (pinInput.value !== OPERATOR_PIN) {
                showNotification('暗証番号が正しくありません', 'error');
                return;
            }
            pinInput.value = '';
            document.getElementById('busSelectionModal').classList.add('hidden');
            startTracking(selectedBusNumber);
        });

        // ========================================
        // 追跡開始
        // ========================================
        async function startTracking(busNumber) {
            if (!navigator.geolocation) {
                showNotification('位置情報が利用できません', 'error');
                return;
            }
            if (!authReady || !window.database) {
                showNotification('認証準備中です。数秒待ってからもう一度お試しください', 'error');
                return;
            }

            const busId = 'bus' + busNumber;
            const busRef = ref(window.database, `buses/${busId}`);
            const sessionId = String(Date.now());

            // 同じ号車が既に運行中でないかを確認しつつ排他的に開始する
            let result;
            try {
                result = await runTransaction(busRef, (current) => {
                    if (current && current.isActive) {
                        const last = current.lastUpdate || 0;
                        if (Date.now() - last < STALE_TAKEOVER_MS) {
                            return; // 中断（本当に運行中）
                        }
                        // 更新が長時間止まっている＝異常終了の残留データとみなして再開を許可
                    }
                    return {
                        ...current,
                        busNumber: busNumber,
                        isActive: true,
                        startTime: Date.now(),
                        lastUpdate: Date.now(),
                        currentSessionId: sessionId,
                        notice: null
                    };
                });
            } catch (error) {
                console.error('運行開始の記録に失敗:', error);
                showNotification('運行開始処理に失敗しました。通信環境を確認してください', 'error');
                return;
            }

            if (!result.committed) {
                showNotification(`${busNumber}号車は既に運行中です`, 'error');
                return;
            }

            // アプリが強制終了・切断された場合に自動で運行終了扱いにする
            onDisconnect(busRef).update({ isActive: false, endTime: serverTimestamp() })
                .catch((error) => console.error('onDisconnectの登録に失敗:', error));

            isTracking = true;
            startTime = Date.now();
            updateCount = 0;
            path = [];
            currentBusId = busId;
            currentSessionId = sessionId;
            lastWrittenPos = null;
            lastWriteTime = 0;
            writeFailureNotified = false;

            // ボタンの表示を変更
            const button = document.getElementById('startButton');
            button.classList.remove('stopped');
            button.classList.add('running');
            button.innerHTML = ICON_STOP_SQ + '<div>運行終了</div>';

            document.getElementById('statusText').textContent = '運行中';
            document.getElementById('busBadge').innerHTML = `<span class="bus-badge">${busNumber}号車</span>`;
            document.getElementById('noticeButton').style.display = 'block';
            currentNoticeMessage = null;
            updateNoticeUI();

            // マーカーに号車番号を表示
            marker.setLabel({
                text: busNumber.toString(),
                color: 'white',
                fontSize: '14px',
                fontWeight: 'bold'
            });

            await requestWakeLock();

            // 位置情報の監視開始
            watchId = navigator.geolocation.watchPosition(
                updatePosition,
                handleError,
                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }
            );

            durationInterval = setInterval(updateDuration, 1000);

            showNotification(`${busNumber}号車の運行を開始しました`, 'success');

            // 出発の連絡は自動送信せず、運転手（添乗の先生）に確認してから送る
            if (confirm('保護者に「園を出発しました」と連絡しますか？')) {
                await sendNotice('園を出発しました');
            }
        }

        // ========================================
        // 追跡停止
        // ========================================
        async function stopTracking() {
            // 到着の連絡を送るか確認（停止処理でnoticeがクリアされる前に送る。
            // プッシュ送信はnotice書き込み時点で発火するため、直後のクリアと競合しない）
            if (confirm('保護者に「園に到着しました」と連絡しますか？')) {
                await sendNotice('園に到着しました');
            }

            isTracking = false;

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }

            // Firebaseに運行終了を記録
            if (window.database && currentBusId) {
                const busRef = ref(window.database, `buses/${currentBusId}`);
                try {
                    await onDisconnect(busRef).cancel();
                    // notice はここではクリアしない（到着連絡を運行終了後も保護者に
                    // 見せるため。次回の運行開始トランザクションでクリアされる）
                    await update(busRef, {
                        isActive: false,
                        endTime: Date.now()
                    });
                } catch (error) {
                    console.error('運行終了の記録に失敗:', error);
                    showNotification('運行終了の記録に失敗しました（通信環境を確認してください）', 'error');
                }
            }

            await releaseWakeLock();

            // ボタンの表示を変更
            const button = document.getElementById('startButton');
            button.classList.remove('running');
            button.classList.add('stopped');
            button.innerHTML = ICON_PLAY + '<div>運行開始</div>';

            document.getElementById('statusText').textContent = '待機中';
            document.getElementById('busBadge').innerHTML = '';
            document.getElementById('noticeButton').style.display = 'none';
            currentNoticeMessage = null;
            updateNoticeUI();

            // マーカーのラベルをクリア
            marker.setLabel(null);

            showNotification('運行を終了しました', 'success');
            currentBusId = null;
            currentSessionId = null;
        }

        // ========================================
        // 2点間の距離（メートル）
        // ========================================
        function haversineDistanceMeters(a, b) {
            const R = 6371000;
            const toRad = (deg) => deg * Math.PI / 180;
            const dLat = toRad(b.lat - a.lat);
            const dLng = toRad(b.lng - a.lng);
            const lat1 = toRad(a.lat);
            const lat2 = toRad(b.lat);
            const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(h));
        }

        const MIN_WRITE_INTERVAL_MS = 4000;
        const MIN_WRITE_DISTANCE_M = 15;

        // ========================================
        // 位置情報の更新
        // ========================================
        async function updatePosition(position) {
            const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
            };

            // マーカーを更新（画面表示は毎回反映）
            marker.setPosition(pos);
            map.panTo(pos);

            // パスに追加
            path.push(pos);
            polyline.setPath(path);

            // 情報を更新
            updateCount++;
            document.getElementById('updateCount').textContent = updateCount + '回';
            document.getElementById('accuracy').textContent = Math.round(position.coords.accuracy) + 'm';

            console.log('位置更新:', pos);

            if (!window.database || !currentBusId) return;

            // Firebaseへの書き込みは一定時間・距離ごとに間引く（通信量とDB肥大化の抑制）
            const now = Date.now();
            const movedEnough = !lastWrittenPos || haversineDistanceMeters(lastWrittenPos, pos) >= MIN_WRITE_DISTANCE_M;
            const timeEnough = now - lastWriteTime >= MIN_WRITE_INTERVAL_MS;
            if (!movedEnough && !timeEnough) return;

            try {
                const locationRef = ref(window.database, `buses/${currentBusId}/location`);
                await set(locationRef, {
                    latitude: pos.lat,
                    longitude: pos.lng,
                    accuracy: position.coords.accuracy,
                    timestamp: now,
                    heading: position.coords.heading || null,
                    speed: position.coords.speed || null
                });
                await update(ref(window.database, `buses/${currentBusId}`), { lastUpdate: now });

                // パスは運行セッションごとに分けて保存（過去分と混ざらないように）。
                // 停車中の肥大化を防ぐため、一定距離以上動いたときだけ追加する
                if (movedEnough) {
                    const pathRef = ref(window.database, `buses/${currentBusId}/sessions/${currentSessionId}/path`);
                    await push(pathRef, {
                        lat: pos.lat,
                        lng: pos.lng,
                        timestamp: now
                    });
                }

                lastWrittenPos = pos;
                lastWriteTime = now;
                writeFailureNotified = false;
            } catch (error) {
                console.error('位置情報の送信に失敗:', error);
                if (!writeFailureNotified) {
                    showNotification('位置情報の送信に失敗しました（通信環境を確認してください）', 'error');
                    writeFailureNotified = true;
                }
            }
        }

        // ========================================
        // 画面ロック防止（Wake Lock）
        // ========================================
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (error) {
                console.warn('画面ロック防止を有効にできませんでした:', error);
            }
        }

        async function releaseWakeLock() {
            if (wakeLock) {
                try {
                    await wakeLock.release();
                } catch (error) {
                    // 解放失敗は無視してよい
                }
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (isTracking && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // ========================================
        // 保護者への連絡（運行中のみ。プリセットをタップで即送信）
        // ========================================
        let currentNoticeMessage = null;

        function updateNoticeUI() {
            const button = document.getElementById('noticeButton');
            button.innerHTML = ICON_MEGAPHONE + (currentNoticeMessage ? '連絡中' : '連絡');
            button.classList.toggle('active', !!currentNoticeMessage);
            document.getElementById('noticeStatus').textContent = currentNoticeMessage || 'なし';
        }

        async function sendNotice(message) {
            if (!window.database || !currentBusId) return;
            try {
                await update(ref(window.database, `buses/${currentBusId}`), {
                    notice: { message: message, timestamp: Date.now() }
                });
                currentNoticeMessage = message;
                updateNoticeUI();
                showNotification(`保護者へ連絡しました: ${message}`, 'success');
            } catch (error) {
                console.error('連絡の送信に失敗:', error);
                showNotification('連絡の送信に失敗しました（通信環境を確認してください）', 'error');
            }
        }

        async function cancelNotice() {
            if (!window.database || !currentBusId) return;
            try {
                await update(ref(window.database, `buses/${currentBusId}`), { notice: null });
                currentNoticeMessage = null;
                updateNoticeUI();
                showNotification('連絡を取り消しました', 'success');
            } catch (error) {
                console.error('連絡の取り消しに失敗:', error);
                showNotification('取り消しに失敗しました（通信環境を確認してください）', 'error');
            }
        }

        document.getElementById('noticeButton').addEventListener('click', function() {
            if (!isTracking) return;
            const block = document.getElementById('currentNoticeBlock');
            if (currentNoticeMessage) {
                document.getElementById('currentNoticeText').textContent = `📤 送信中: ${currentNoticeMessage}`;
                block.classList.remove('hidden');
            } else {
                block.classList.add('hidden');
            }
            document.getElementById('noticeModal').classList.remove('hidden');
        });

        document.getElementById('noticeCancelButton').addEventListener('click', function() {
            document.getElementById('noticeModal').classList.add('hidden');
        });

        document.getElementById('cancelNoticeButton').addEventListener('click', async function() {
            document.getElementById('noticeModal').classList.add('hidden');
            await cancelNotice();
        });

        document.querySelectorAll('.notice-option').forEach((button) => {
            button.addEventListener('click', async function() {
                document.getElementById('noticeModal').classList.add('hidden');
                await sendNotice(this.dataset.message);
            });
        });

        // ========================================
        // 情報パネルのトグル機能
        // ========================================
        document.getElementById('infoPanel').addEventListener('click', function() {
            this.classList.toggle('collapsed');
        });

        // PWAのインストールプロンプト
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
